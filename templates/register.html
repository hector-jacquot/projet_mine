{% extends "base.html" %}
{% set title = "Inscription" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h5 mb-3">Inscription</h1>
          <form method="post" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

            <div class="mb-3">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" required autocomplete="email" />
            </div>

            <div class="mb-3">
              <label class="form-label" for="password">Mot de passe</label>
              <input class="form-control" id="password" name="password" type="password" required autocomplete="new-password" />
              <div class="form-text">Minimum 8 caractères.</div>
            </div>

            <button class="btn btn-warning w-100" type="submit">Créer le compte</button>
          </form>

          <hr />
          <p class="small mb-0">
            Déjà un compte ?
            <a href="{{ url_for('login') }}">Se connecter</a>.
          </p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
