{% extends "base.html" %}
{% set title = "Connexion" %}

{% block content %}
<section aria-labelledby="login-title" style="max-width: 40rem; margin: 4rem auto;">
    <h1 id="login-title">Connexion à votre espace</h1>
    <p>Veuillez entrer vos identifiants pour accéder au dashboard de la mine.</p>

    <form method="post" novalidate style="margin-top: 2rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

        <div class="form-group">
            <label for="email">Adresse Email</label>
            <input 
                id="email" 
                name="email" 
                type="email" 
                required 
                autocomplete="email" 
                aria-required="true"
                placeholder="ex: jean.dupont@isep.fr"
            />
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input 
                id="password" 
                name="password" 
                type="password" 
                required 
                autocomplete="current-password" 
                aria-required="true"
            />
        </div>

        <button class="btn" type="submit" style="width: 100%;">Se connecter</button>
    </form>

    <p style="margin-top: 2rem;">
        Pas encore de compte ? 
        <a href="{{ url_for('register') }}">Inscrivez-vous ici</a>.
    </p>
</section>
{% endblock %}
